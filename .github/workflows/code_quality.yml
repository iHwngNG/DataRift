name: Code Quality CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  python-validation:
    name: Python Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linting, Type-Checking, and Test Tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest requests types-requests

      - name: Run Ruff Linter Check
        run: ruff check src/ tests/

      - name: Run Ruff Formatter Check
        run: ruff format --check src/ tests/

      - name: Run mypy Type Safety Checks
        run: mypy src/ tests/

      - name: Run pytest Unit Tests
        env:
          PYTHONPATH: .
        run: pytest tests/

  terraform-validation:
    name: Terraform Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.2"

      - name: Check Terraform Formatting
        run: terraform fmt -check -recursive infra/

      - name: Initialize and Validate Dev Configuration
        run: |
          terraform -chdir=infra/env/dev init -backend=false
          terraform -chdir=infra/env/dev validate

      - name: Initialize and Validate Prod Configuration
        run: |
          terraform -chdir=infra/env/prod init -backend=false
          terraform -chdir=infra/env/prod validate
