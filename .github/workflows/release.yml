name: Release

on:
  push:
    tags:
      - "v*"  # Trigger on version tags like v1.0.0
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.14"
  UV_VERSION: "0.4.0"
  IMAGE_NAME: ${{ github.repository_owner }}/datarift

jobs:
  # ─────────────────────────────────────────────
  # Release Validation
  # ─────────────────────────────────────────────
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Cache uv artifacts
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ env.UV_VERSION }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-${{ env.UV_VERSION }}-
            ${{ runner.os }}-uv-

      - name: Install dependencies
        run: uv sync --dev

      - name: Validate Python version in pyproject.toml
        run: |
          VERSION=$(grep 'requires-python' pyproject.toml | grep -oP '\d+\.\d+' | head -1)
          echo "Project requires Python $VERSION"
          if [ "$VERSION" != "${{ env.PYTHON_VERSION }}" ]; then
            echo "::error::Python version mismatch!"
            exit 1
          fi

      - name: Run full quality checks
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Run full test suite
        run: uv run pytest -v

  # ─────────────────────────────────────────────
  # Build & Publish Package
  # ─────────────────────────────────────────────
  publish:
    name: Publish Package
    runs-on: ubuntu-latest
    needs: validate
    environment: release
    permissions:
      id-token: write  # Required for trusted publishing
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Build package
        run: uv build

      - name: Publish to Test PyPI (optional)
        if: false  # Enable if using Test PyPI first
        run: uv pip publish --repository testpypi dist/

      - name: Publish to PyPI
        run: uv pip publish dist/

  # ─────────────────────────────────────────────
  # Create GitHub Release
  # ─────────────────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [validate, publish]
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          CHANGELOG=$(git log --pretty=format:"- %s (%h)" --since=$(git describe --tags --abbrev=0 2>/dev/null || echo "1970-01-01")..HEAD 2>/dev/null || echo "Initial release")
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Get version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          name: Release v${{ steps.version.outputs.version }}
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.changelog }}

            **Full Changelog**: https://github.com/${{ github.repository }}/compare/${{ github.event.repository.default_branch }}...${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release assets
        run: |
          uv build
          for file in dist/*; do
            gh release upload ${{ github.ref }} "$file" --clobber
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
