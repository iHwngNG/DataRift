# =============================================================================
# Job B: Match ID Ingestion Configuration
# =============================================================================

# Sharding
sharding:
  shard_count: 4

# Thread pool
thread_pool_size: 8

# Parquet buffer size (MB)
buffer_flush_mb: 1

# Pagination
pagination_count: 100

# Max match IDs per PUUID
max_match_ids_per_puuid_first_run: 1000
max_match_ids_per_puuid_incremental: 1000

# Platforms to process
platforms:
  - kr
  - vn2
  - euw1
  - eun1

# Platform to Region mapping
platform_region:
  kr: asia
  vn2: sea
  euw1: europe
  eun1: europe
